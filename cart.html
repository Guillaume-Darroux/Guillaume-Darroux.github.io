<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Import de la police Railway -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <!-- L'ordre d'import des fichiers de style est important : en cas d'égalité sur le ciblage de l'élement, c'est le dernier style défini qui s'applique ! -->
  <link rel="stylesheet" href="./css/reset.css">
  <!-- Bonne pratique, on notre fichier de style personnalisé en dernier -->
  <link rel="stylesheet" href="./css/style.css">

  <title>oFig</title>
</head>
<body>
  <div>
    <header class="header">
      <h1 class="header__title"><strong class="header__title--big">oFig</strong>Figurines et statuettes</h1>
      <h2 class="header__subtitle">Votre panier <em class="header__subtitle--italic">2 produits</em></h2>
    </header>

    <main class="contact-cart">
        <section class="shipping-info">
            <h3>Préférences de livraison</h3>
                <form>
                    <fieldset class="fieldset-shipping-choice">
                        <legend class="legend-shipping">Où souhaitez-vous être livré ?</legend>
                        <div>
                            <input type="radio" name="shipping-address" id="current-address" value="current-address">
                            <label for="shipping-address">Mon adresse courante</label>
                            
                            <div>
                                <input type="radio" name="shipping-address" id="another-address" value="another-address" checked>
                                <label for="shipping-address">Autre adresse</label>
                            </div>
                        </div>
                    </fieldset>

                    <fieldset class="fieldset-options">
                        <legend class="legend-options">Options</legend>
                            
                            <div>
                                <input type="checkbox" id="sms" name="sms" checked>
                                <label for="sms">Suivi de livraison par sms (inclus)</label>
                            </div>
                            <div>
                                <input type="checkbox" id="satisfy-or-refund" name="satisfy-or-refund">
                                <label for="satisfy-or-refund">Satisfait ou remboursé (+2 euros)</label>
                            </div>
                            <div>
                                <input type="checkbox" id="warranty" name="warranty">
                                <label for="warranty">Garantie 2 ans (+10 euros)</label>
                            </div>
                    </fieldset>

                    <fieldset class="fieldset-address">
                        <legend class="legend-address">Adresse</legend>
                            <div>
                                <div class="div-address"><label for="address-street">Rue</label></div>
                                <div><input type="text" id="address-street" name="address-street"></div>
                            </div>
                
                            <div>
                                <div class="div-address"><label for="zip-code">Code postal</label></div>
                                <div><input type="text" id="zip-code" name="zip-code"></div>
                            </div>
                            <div>
                                <div class="div-address"><label for="city">Ville</label></div>
                                <div><input type="text" id="city" name="city"></div>
                            </div>

                            <h4>Informations complémentaires</h4>
                            <div>
                                <label for="others">interphone, bâtiment, etc.</label>
                                <textarea name="others" id="others" cols="30" rows="4"></textarea>
                            </div>
                    </fieldset>

                    <div class="div-total-amount">
                        <span class="total-amount">Montant total à régler :</span>
                        <!-- <input type="text" id="total-amount-price" name="total-amount-price"> -->
                        <span class="amount-price">197 €</span>

                    </div>
                    
                    <div class="div-submit">
                        <a href="/index.html" class="continue-buying">Continuer vos achats</a>
                        <input type="submit" value="Valider et payer" class="pay">  
                    </div>


                </form>


        </section>

    </main>
  </div>
  
  <footer class="footer">
    <p>oFig - toutes les images sont sous copyright SquareEnix</p>
  </footer>
</body>
</html>
